<!DOCTYPE html>
<html lang="es">
<head>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>TEAyudo</title>
<style>
  :root {
    --primary: #4A90D9;
    --primary-dark: #2C6FAC;
    --accent-persona: #F97B6B;
    --accent-accion: #6BC47E;
    --accent-objeto: #F5C842;
    --accent-social: #B07FE8;
    --accent-necesidad: #F97B6B;
    --accent-comida: #F4A340;
    --accent-lugar: #4ABFD9;
    --bg: #F8F6FF;
    --card-bg: #FFFFFF;
    --text: #2D2A3E;
    --text-muted: #7A7A9A;
    --radius: 18px;
    --shadow: 0 4px 16px rgba(74,144,217,0.10);
    --shadow-lg: 0 8px 32px rgba(74,144,217,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    background: #fff;
    border-bottom: 2px solid #EDE9FF;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--primary), #7C5FBF);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--primary), #7C5FBF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .settings-btn {
    background: #F0EEFF;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    transition: background 0.15s, transform 0.1s;
    color: var(--primary-dark);
  }
  .settings-btn:active { transform: scale(0.94); background: #DDD8FF; }

  /* MAIN CONTENT */
  .main {
    padding: 12px 12px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 10px;
    cursor: pointer;
    user-select: none;
    border-bottom: 2px solid #F5F3FF;
  }
  .section-header:active { opacity: 0.85; }

  .section-emoji {
    font-size: 26px;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .persona-color   { background: #FFF0EE; }
  .accion-color    { background: #EEFBF0; }
  .objeto-color    { background: #FFFBEB; }
  .social-color    { background: #F3EEFF; }
  .necesidad-color { background: #FFF0EE; }
  .comida-color    { background: #FFF8EE; }
  .lugar-color     { background: #EEF9FF; }

  .section-label {
    flex: 1;
  }
  .section-label h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    line-height: 1;
    margin-bottom: 3px;
  }
  .section-selected {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .section-selected.empty {
    font-weight: 600;
    color: var(--text-muted);
    font-style: italic;
  }

  .section-picto {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    object-fit: contain;
    background: #F8F6FF;
    border: 2px solid #EDE9FF;
    flex-shrink: 0;
  }
  .section-picto.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #F0EEFF;
    border: 2px dashed #C5BEFF;
    flex-shrink: 0;
    color: #C5BEFF;
    font-size: 22px;
  }

  .chevron {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.2s;
  }

  /* RESULTADO BUTTON */
  .resultado-wrap {
    padding: 10px 12px 16px;
  }

  .resultado-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), #7C5FBF);
    color: #fff;
    border: none;
    border-radius: 18px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(74,144,217,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .resultado-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(74,144,217,0.25); }
  .resultado-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .resultado-btn span.icon { font-size: 24px; }

  /* FRASES GUARDADAS */
  .frases-section {
    padding: 0 12px 16px;
  }
  .frases-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .frases-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .frase-item {
    background: #fff;
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1.5px solid #EDE9FF;
    cursor: pointer;
    transition: background 0.1s;
  }
  .frase-item:active { background: #F0EEFF; }
  .frase-pictos { display: flex; gap: 4px; flex-shrink: 0; }
  .frase-picto { width: 32px; height: 32px; border-radius: 8px; object-fit: contain; background: #F8F6FF; }
  .frase-text { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .frase-play { font-size: 20px; color: var(--primary); flex-shrink: 0; }

  /* ======================== PICKER SCREEN ======================== */
  .picker-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-width: 480px;
    margin: 0 auto;
  }
  .picker-screen.open { transform: translateY(0); }

  .picker-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: #fff;
    border-bottom: 2px solid #EDE9FF;
    flex-shrink: 0;
  }
  .back-btn {
    background: #F0EEFF;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    color: var(--primary-dark);
  }
  .back-btn:active { background: #DDD8FF; }
  .picker-title { font-size: 18px; font-weight: 800; color: var(--text); }
  .picker-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 600; }

  .picker-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    overflow-y: auto;
    flex: 1;
    align-content: flex-start;
  }

  .picto-card {
    background: #fff;
    border-radius: 12px;
    border: 2px solid #EDE9FF;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 7px 6px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, background 0.1s;
    position: relative;
    width: 76px;
    flex-shrink: 0;
  }
  .picto-card:active { transform: scale(0.95); background: #F0EEFF; }
  .picto-card.selected { border-color: var(--primary); background: #EEF6FF; }
  .picto-card img {
    width: 54px;
    height: 54px;
    object-fit: contain;
    border-radius: 8px;
  }
  .picto-card .picto-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
    word-break: break-word;
    max-width: 68px;
  }
  .picto-card .delete-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    background: #E24B4A;
    color: #fff;
    border: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    display: none;
  }

  .empty-picker {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    grid-column: 1/-1;
  }
  .empty-picker .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-picker p { font-size: 15px; font-weight: 600; }
  .empty-picker small { font-size: 13px; }

  /* ======================== SETTINGS MODAL ======================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,42,62,0.55);
    z-index: 300;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 480px;
    margin: 0 auto;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 0 0 32px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 88dvh;
    display: flex;
    flex-direction: column;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: #DDD8FF;
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid #F0EEFF;
    flex-shrink: 0;
  }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--text); }
  .modal-close {
    background: #F0EEFF;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
  }

  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

  .modal-section-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 14px;
    border-radius: 30px;
    border: 2px solid transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tab-btn.persona   { background: #FFF0EE; color: #C0432E; border-color: #FFC4BB; }
  .tab-btn.persona.active   { background: #F97B6B; color: #fff; border-color: #F97B6B; }
  .tab-btn.accion    { background: #EEFBF0; color: #1A7C33; border-color: #A3E8B0; }
  .tab-btn.accion.active    { background: #6BC47E; color: #fff; border-color: #6BC47E; }
  .tab-btn.objeto    { background: #FFFBEB; color: #8A6A00; border-color: #F5D77A; }
  .tab-btn.objeto.active    { background: #F5C842; color: #fff; border-color: #F5C842; }
  .tab-btn.social    { background: #F3EEFF; color: #6B35BF; border-color: #C9AAEE; }
  .tab-btn.social.active    { background: #B07FE8; color: #fff; border-color: #B07FE8; }
  .tab-btn.necesidad { background: #FFF0EE; color: #C0432E; border-color: #FFC4BB; }
  .tab-btn.necesidad.active { background: #F97B6B; color: #fff; border-color: #F97B6B; }
  .tab-btn.comida    { background: #FFF8EE; color: #9A5A00; border-color: #F5CFA0; }
  .tab-btn.comida.active    { background: #F4A340; color: #fff; border-color: #F4A340; }
  .tab-btn.lugar     { background: #EEF9FF; color: #006A8A; border-color: #A0DCEE; }
  .tab-btn.lugar.active     { background: #4ABFD9; color: #fff; border-color: #4ABFD9; }

  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
    background: #F8F6FF;
    border-radius: 14px;
    padding: 14px;
  }
  .add-form label { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 2px; }
  .add-form input {
    padding: 10px 14px;
    border: 2px solid #EDE9FF;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .add-form input:focus { border-color: var(--primary); }

  .search-preview {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 70px;
    margin-top: 4px;
  }
  .preview-picto {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    border-radius: 10px;
    padding: 5px;
    border: 2px solid transparent;
    transition: border-color 0.1s, background 0.1s;
    background: #fff;
  }
  .preview-picto:hover, .preview-picto.sel { border-color: var(--primary); background: #EEF6FF; }
  .preview-picto img { width: 52px; height: 52px; object-fit: contain; }
  .preview-picto span { font-size: 10px; font-weight: 700; color: var(--text-muted); text-align: center; max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .search-loading { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 10px 0; }

  .add-btn {
    padding: 11px 16px;
    background: linear-gradient(135deg, var(--primary), #7C5FBF);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: transform 0.1s, opacity 0.1s;
    width: 100%;
  }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .saved-list { display: flex; flex-direction: column; gap: 6px; }
  .saved-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #F8F6FF;
    border-radius: 12px;
    padding: 8px 12px;
    border: 1.5px solid #EDE9FF;
  }
  .saved-item img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; background: #fff; }
  .saved-item-name { font-size: 14px; font-weight: 700; flex: 1; color: var(--text); }
  .del-item-btn {
    background: none;
    border: none;
    color: #E24B4A;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    display: flex;
    align-items: center;
  }
  .del-item-btn:active { background: #FFEAEA; }

  /* MULTI-PICTO STRIP */
  .section-pictos-strip {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    align-items: center;
    flex-shrink: 0;
    max-width: 130px;
    overflow-x: auto;
  }
  .section-picto {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    object-fit: contain;
    background: #F8F6FF;
    border: 2px solid #EDE9FF;
    flex-shrink: 0;
  }
  .section-picto.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #F0EEFF;
    border: 2px dashed #C5BEFF;
    flex-shrink: 0;
    color: #C5BEFF;
  }
  .section-picto-add-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #F0EEFF;
    border: 2px dashed #C5BEFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #C5BEFF;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .section-picto-add-btn:active { background: #DDD8FF; border-color: var(--primary); }
  .section-picto-remove-btn {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #E24B4A;
    color: #fff;
    border: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1;
    line-height: 1;
  }
  .section-picto-wrap {
    position: relative;
    flex-shrink: 0;
  }

  /* FAVORITES BUTTON */
  .fav-btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: var(--primary-dark);
    border: 2px solid #EDE9FF;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.12s, border-color 0.12s;
    margin-bottom: 10px;
  }
  .fav-btn:active { background: #F0EEFF; border-color: var(--primary); }

  /* FAVORITES MODAL */
  .fav-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,42,62,0.55);
    z-index: 400;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 480px;
    margin: 0 auto;
  }
  .fav-overlay.open { opacity: 1; pointer-events: all; }
  .fav-modal {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 0 0 32px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 80dvh;
    display: flex;
    flex-direction: column;
  }
  .fav-overlay.open .fav-modal { transform: translateY(0); }
  .fav-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid #F0EEFF;
    flex-shrink: 0;
  }
  .fav-modal-title { font-size: 18px; font-weight: 800; color: var(--text); }
  .fav-modal-body { padding: 12px 16px; overflow-y: auto; flex: 1; }
  .fav-item {
    background: #F8F6FF;
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1.5px solid #EDE9FF;
    transition: background 0.1s;
    margin-bottom: 10px;
  }
  .fav-item:active { background: #EEF6FF; border-color: var(--primary); }
  .fav-item-header { display: flex; align-items: center; gap: 8px; }
  .fav-item-pictos { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .fav-item-picto { width: 48px; height: 48px; border-radius: 10px; object-fit: contain; background: #fff; border: 1.5px solid #EDE9FF; }
  .fav-item-info { display: flex; flex-direction: column; gap: 2px; }
  .fav-item-text { font-size: 14px; font-weight: 700; color: var(--text); }
  .fav-item-natural { font-size: 13px; font-weight: 600; color: var(--primary); font-style: italic; }
  .fav-item-count { font-size: 11px; color: var(--text-muted); font-weight: 700; }
  .fav-item-actions {
    display: flex;
    gap: 8px;
  }
  .fav-item-play-btn {
    flex: 1;

  /* AI STATUS */
  .ai-status {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    font-style: italic;
    text-align: center;
    margin-top: 4px;
    min-height: 16px;
  }
  .speaking-overlay {
    position: fixed;
    inset: 0;
    background: rgba(74,144,217,0.15);
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 480px;
    margin: 0 auto;
  }
  .speaking-overlay.visible { opacity: 1; pointer-events: all; }
  .speaking-content {
    background: #fff;
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow: 0 8px 40px rgba(74,144,217,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-width: 320px;
    width: 90%;
  }
  .speaking-pictos { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .speaking-pictos img { width: 72px; height: 72px; object-fit: contain; border-radius: 14px; border: 2px solid #EDE9FF; }
  .speaking-text { font-size: 20px; font-weight: 800; color: var(--text); text-align: center; line-height: 1.3; }
  .wave-bars {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 32px;
  }
  .wave-bar {
    width: 5px;
    background: var(--primary);
    border-radius: 3px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 28px; }
  }

  /* No scroll when modals open */
  body.no-scroll { overflow: hidden; }

  /* LOADING SPINNER */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2.5px solid #EDE9FF;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TRANSCRIBE BUTTON */
  .transcribe-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7C5FBF, #4A90D9);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 4px 16px rgba(124,95,191,0.30);
    margin-top: 2px;
  }
  .transcribe-btn:active { transform: scale(0.97); }

  /* TRANSCRIBE MODAL */
  .transcribe-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,42,62,0.55);
    z-index: 400;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;

    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 480px;
    margin: 0 auto;
  }
  .transcribe-overlay.open { opacity: 1; pointer-events: all; }
  .transcribe-modal {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 0 0 32px;

    flex-direction: column;
    gap: 14px;

    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .transcribe-textarea {
    width: 100%;

    font-family: inherit;
    font-size: 16px;
    font-weight: 600;

  .transcribe-textarea:focus { border-color: var(--primary); background: #fff; }
  .transcribe-go-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7C5FBF, #4A90D9);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.12s, opacity 0.12s;

  .transcribe-go-btn:active { transform: scale(0.97); }
  .transcribe-go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* TRANSCRIBE RESULT */
  .transcribe-result {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .transcribe-result-label {
    font-size: 12px;

    letter-spacing: 0.8px;
    color: var(--text-muted);

  .transcribe-pictos-row {

    gap: 10px;
    align-items: flex-start;
  }
  .transcribe-picto-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;

  }

  .transcribe-speak-btn {

  /* CHANGE BADGE ON PICTO */
  .tp-img-wrap {
    position: relative;

  }
  .tp-img-wrap img {
    width: 68px;
    height: 68px;

  .transcribe-picto-item:hover .tp-img-wrap img,

  .draggable-picto { transition: opacity 0.15s; }
  .draggable-picto.dragging { opacity: 0.3; }
  .tp-drag-handle {
    position: absolute;

  /* ALT PICKER */
  .alt-picker-label {

  .ambito-cat-toggle.on .ambito-cat-toggle-check { opacity: 1; }
  .ambito-name-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .ambito-name-emoji { width: 48px; height: 40px; font-size: 20px; text-align: center; border: 2px solid #C5BEFF; border-radius: 10px; background: #fff; }
  .ambito-name-input { flex: 1; height: 40px; padding: 0 12px; border: 2px solid #C5BEFF; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text); background: #fff; outline: none; }
  .ambito-save-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--primary), #7C5FBF); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
  .ambito-save-btn:active { transform: scale(0.97); }

  .ambito-add-new-btn:active { background: #F0EEFF; }


</style>
</head>

<script>
const ARASAAC_BASE = 'https://api.arasaac.org/v1';
const IMG_BASE = 'https://static.arasaac.org/pictograms';

// ---- DEFAULT CATEGORIES ----
const DEFAULT_CATEGORIES = [
  { key: 'social',    emoji: '👋', name: 'Sociales',       color: '#B07FE8', bg: '#F3EEFF', text: '#6B35BF', border: '#C9AAEE' },
  { key: 'persona',   emoji: '🧑', name: 'Personas',       color: '#F97B6B', bg: '#FFF0EE', text: '#C0432E', border: '#FFC4BB' },
  { key: 'accion',    emoji: '🎯', name: 'Acciones',       color: '#6BC47E', bg: '#EEFBF0', text: '#1A7C33', border: '#A3E8B0' },
  { key: 'objeto',    emoji: '🎁', name: 'Objeto / Estado',color: '#F5C842', bg: '#FFFBEB', text: '#8A6A00', border: '#F5D77A' },
  { key: 'necesidad', emoji: '❤️', name: 'Necesidades',    color: '#F97B6B', bg: '#FFF0EE', text: '#C0432E', border: '#FFC4BB' },
  { key: 'comida',    emoji: '🍎', name: 'Comida / Bebida',color: '#F4A340', bg: '#FFF8EE', text: '#9A5A00', border: '#F5CFA0' },
  { key: 'lugar',     emoji: '📍', name: 'Lugares',        color: '#4ABFD9', bg: '#EEF9FF', text: '#006A8A', border: '#A0DCEE' },
];

// ---- DEFAULT ÁMBITOS ----
const DEFAULT_AMBITOS = [
  { key: 'global',  emoji: '🌐', name: 'Global',  cats: null,  isGlobal: true  },
  { key: 'hogar',   emoji: '🏠', name: 'Hogar',   cats: ['social','persona','accion','objeto','necesidad','comida','lugar'], isGlobal: false },
  { key: 'medico',  emoji: '🏥', name: 'Médico',  cats: ['social','persona','accion','necesidad'], isGlobal: false },
  { key: 'colegio', emoji: '🏫', name: 'Colegio', cats: ['social','persona','accion','objeto','lugar'], isGlobal: false },
];

// ---- STATE ----
let DB = {};
let selected = {};
let categories = [];
let ambitos = [];
let activeAmbito = 'global';
let currentTab = '';
let currentPickerSection = null;
let searchTimeout = null;
let selectedPreviewId = null;
let selectedPreviewUrl = null;
let selectedPreviewKeyword = null;
let lastNaturalText = ''; // AI conjugated version

// ---- RENDER MAIN SECTIONS ----
function getActiveCats() {
  const amb = ambitos.find(a => a.key === activeAmbito);
  if (!amb || amb.isGlobal || !amb.cats) return categories;
  return categories.filter(c => amb.cats.includes(c.key));
}

function renderSectionsMain() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  getActiveCats().forEach(cat => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = `
      <div class="section-header" onclick="openPicker('${cat.key}')">
        <div class="section-emoji" style="background:${cat.bg}">${cat.emoji}</div>
        <div class="section-label">
          <h2>${cat.name}</h2>
          <div class="section-selected empty" id="${cat.key}-label">Toca para elegir…</div>
        </div>
        <div class="section-pictos-strip" id="${cat.key}-pictos-strip">
          <div class="section-picto placeholder" id="${cat.key}-picto-preview">+</div>
        </div>
        <span class="chevron">›</span>
      </div>`;
    container.appendChild(card);
    // Re-render selection state if any
    if (selected[cat.key] && selected[cat.key].length) {
      updateSectionUI(cat.key);
    }
  });
}

// ---- INIT ----
function loadDB() {
  // Load categories
  const storedCats = localStorage.getItem('teayudo_categories');
  if (storedCats) {
    try { categories = JSON.parse(storedCats); } catch(e) { categories = [...DEFAULT_CATEGORIES]; }
  } else {
    categories = [...DEFAULT_CATEGORIES];
  }
  // Load pictos DB
  const stored = localStorage.getItem('teayudo_db');
  if (stored) {
    try { DB = JSON.parse(stored); } catch(e) {}
  }
  // Ensure all category keys exist in DB and selected
  categories.forEach(c => {
    if (!DB[c.key]) DB[c.key] = [];
    if (!selected[c.key]) selected[c.key] = [];
  });
  if (!currentTab && categories.length) currentTab = categories[0].key;
}

function saveCategories() {
  localStorage.setItem('teayudo_categories', JSON.stringify(categories));
}

function saveAmbitos() {
  localStorage.setItem('teayudo_ambitos', JSON.stringify(ambitos));
}

function loadAmbitos() {
  const stored = localStorage.getItem('teayudo_ambitos');
  if (stored) {
    try { ambitos = JSON.parse(stored); } catch(e) { ambitos = [...DEFAULT_AMBITOS]; }
  } else {
    ambitos = [...DEFAULT_AMBITOS];
  }
  if (!activeAmbito) activeAmbito = ambitos[0].key;
}

function saveDB() {
  localStorage.setItem('teayudo_db', JSON.stringify(DB));
}

// ---- ARASAAC API ----
async function searchPictos(keyword) {
  try {
    const url = `${ARASAAC_BASE}/pictograms/es/search/${encodeURIComponent(keyword)}`;
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    return data.slice(0, 8);
  } catch(e) { return []; }
}

function pictoUrl(id) {
  return `${IMG_BASE}/${id}/${id}_2500.png`;
}

// ---- SETTINGS MODAL ----
function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
  document.body.classList.add('no-scroll');
}

function openPictosModal() {
  if (!currentTab && categories.length) currentTab = categories[0].key;
  document.getElementById('pictos-overlay').classList.add('open');
  document.body.classList.add('no-scroll');
  renderModalTabs('pictos-tabs');
  renderSavedList();
  resetAddForm();
}

function closePictosModal() {
  document.getElementById('pictos-overlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
}

function renderModalTabs(containerId) {
  const container = document.getElementById(containerId || 'modal-section-tabs');
  if (!container) return;
  container.innerHTML = '';
  categories.forEach((cat) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat.key === currentTab ? ' active' : '');
    btn.dataset.key = cat.key;
    btn.style.cssText = `background:${cat.bg};color:${cat.text};border-color:${cat.border};`;
    if (cat.key === currentTab) btn.style.cssText += `background:${cat.color};color:#fff;border-color:${cat.color};`;
    btn.textContent = `${cat.emoji} ${cat.name}`;
    btn.onclick = () => setModalTab(cat.key);
    container.appendChild(btn);
  });
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

function setModalTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`.tab-btn[data-key="${tab}"]`).forEach(b => b.classList.add('active'));
  renderSavedList();
  resetAddForm();
}

function resetAddForm() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-preview').innerHTML = '<span class="search-loading">Escribe una palabra para buscar pictogramas…</span>';
  selectedPreviewId = null;
  selectedPreviewUrl = null;
  selectedPreviewKeyword = null;
  document.getElementById('add-btn').disabled = true;
}

async function onSearchInput() {
  const val = document.getElementById('search-input').value.trim();
  selectedPreviewId = null;
  selectedPreviewUrl = null;
  selectedPreviewKeyword = null;
  document.getElementById('add-btn').disabled = true;
  clearTimeout(searchTimeout);
  if (!val) {
    document.getElementById('search-preview').innerHTML = '<span class="search-loading">Escribe una palabra para buscar pictogramas…</span>';
    return;
  }
  document.getElementById('search-preview').innerHTML = '<span class="search-loading"><span class="spinner"></span> Buscando…</span>';
  searchTimeout = setTimeout(async () => {
    const results = await searchPictos(val);
    const wrap = document.getElementById('search-preview');
    if (!results.length) {
      wrap.innerHTML = '<span class="search-loading">No se encontraron pictogramas 😕</span>';
      return;
    }
    wrap.innerHTML = '';
    results.forEach(r => {
      const url = pictoUrl(r._id);
      const keyword = r.keywords && r.keywords[0] ? r.keywords[0].keyword : val;
      const div = document.createElement('div');
      div.className = 'preview-picto';
      div.innerHTML = `<img src="${url}" alt="${keyword}" loading="lazy"><span>${keyword}</span>`;
      div.onclick = () => {
        document.querySelectorAll('.preview-picto').forEach(p => p.classList.remove('sel'));
        div.classList.add('sel');
        selectedPreviewId = r._id;
        selectedPreviewUrl = url;
        selectedPreviewKeyword = document.getElementById('search-input').value.trim() || keyword;
        document.getElementById('add-btn').disabled = false;
      };
      wrap.appendChild(div);
    });
  }, 500);
}

function addPicto() {
  if (!selectedPreviewId) return;
  const word = document.getElementById('search-input').value.trim();
  const exists = DB[currentTab].find(p => p.id === selectedPreviewId);
  if (exists) { alert('Este pictograma ya está en la sección.'); return; }
  // Use the keyword of the selected picto (e.g. "jugar a la pelota") not the search term
  const pictoWord = selectedPreviewKeyword || word;
  DB[currentTab].push({ id: selectedPreviewId, url: selectedPreviewUrl, word: pictoWord });
  saveDB();
  renderSavedList();
  resetAddForm();
}

function deletePicto(section, id) {
  DB[section] = DB[section].filter(p => p.id !== id);
  // Remove from selected if present
  selected[section] = selected[section].filter(p => p.id !== id);
  updateSectionUI(section);
  updateResultButton();
  saveDB();
  renderSavedList();
}

function renderSavedList() {
  const list = document.getElementById('saved-list');
  const items = DB[currentTab];
  if (!items.length) {
    list.innerHTML = '<div style="font-size:14px;color:#7A7A9A;font-weight:600;padding:10px 0;">No hay pictogramas aún. ¡Añade uno!</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(p => {
    const div = document.createElement('div');
    div.className = 'saved-item';
    div.innerHTML = `<img src="${p.url}" alt="${p.word}"><span class="saved-item-name">${p.word}</span><button class="del-item-btn" onclick="deletePicto('${currentTab}', ${p.id})" aria-label="Eliminar">🗑️</button>`;
    list.appendChild(div);
  });
}

// ---- PICKER ----
function getSectionMeta(key) {
  const cat = categories.find(c => c.key === key) || { emoji: '📋', name: key };
  return { title: cat.name, subtitle: `Elige ${cat.name.toLowerCase()}`, emoji: cat.emoji };
}

function openPicker(section) {
  currentPickerSection = section;
  const meta = getSectionMeta(section);
  document.getElementById('picker-title').textContent = meta.emoji + ' ' + meta.title;
  document.getElementById('picker-subtitle').textContent = meta.subtitle;
  renderPickerGrid(section);
  const screen = document.getElementById('picker-screen');
  screen.classList.add('open');
  document.body.classList.add('no-scroll');
}

function closePicker() {
  document.getElementById('picker-screen').classList.remove('open');
  document.body.classList.remove('no-scroll');
  currentPickerSection = null;
}

function renderPickerGrid(section) {
  const grid = document.getElementById('picker-grid');
  const items = DB[section];
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<div class="empty-picker"><div class="empty-icon">📭</div><p>No hay pictogramas en esta sección</p><small>Añade algunos desde ⚙️ Configuración</small></div>`;
    return;
  }
  items.forEach(p => {
    const isSelected = selected[section].some(s => s.id === p.id);
    const card = document.createElement('div');
    card.className = 'picto-card' + (isSelected ? ' selected' : '');
    card.innerHTML = `<img src="${p.url}" alt="${p.word}" loading="lazy"><div class="picto-label">${p.word}</div>`;
    card.onclick = () => togglePicto(section, p, card);
    grid.appendChild(card);
  });
}

function togglePicto(section, p, card) {
  const idx = selected[section].findIndex(s => s.id === p.id);
  if (idx > -1) {
    // Deselect
    selected[section].splice(idx, 1);
    card.classList.remove('selected');
  } else {
    // Select (add)
    selected[section].push(p);
    card.classList.add('selected');
  }
  updateSectionUI(section);
  updateResultButton();
  lastNaturalText = ''; // reset AI text on change
  document.getElementById('ai-status').textContent = '';
}

function updateSectionUI(section) {
  const items = selected[section];
  const label = document.getElementById(section + '-label');
  const strip = document.getElementById(section + '-pictos-strip');

  if (items.length > 0) {
    label.textContent = items.map(p => p.word).join(', ');
    label.classList.remove('empty');
    strip.innerHTML = items.map(p =>
      `<div class="section-picto-wrap">
        <img class="section-picto" src="${p.url}" alt="${p.word}">
        <button class="section-picto-remove-btn" onclick="removePictoFromSection(event,'${section}',${p.id})">✕</button>
      </div>`
    ).join('') + `<div class="section-picto-add-btn" onclick="openPicker('${section}');event.stopPropagation()">+</div>`;
  } else {
    label.textContent = 'Toca para elegir…';
    label.classList.add('empty');
    strip.innerHTML = `<div class="section-picto placeholder" id="${section}-picto-preview">+</div>`;
  }
}

function removePictoFromSection(event, section, id) {
  event.stopPropagation();
  selected[section] = selected[section].filter(p => p.id !== id);
  updateSectionUI(section);
  updateResultButton();
  lastNaturalText = '';
  document.getElementById('ai-status').textContent = '';
}

// ---- AI CONJUGATION ----
async function getNaturalPhrase(rawText) {
  try {
    const result = await groq([
      {
        role: 'system',
        content: `Eres un experto en comunicación aumentativa (AAC) para personas con TEA. Conviertes palabras clave de un comunicador en frases naturales en español.

REGLAS ESTRICTAS:
1. SUJETO OBLIGATORIO: Incluye siempre el sujeto explícito. Si no aparece en las palabras, infiere "Yo". Nunca omitas el sujeto.
2. VERBO CONJUGADO: Conjuga el verbo según el sujeto (yo → quiero, él/ella → quiere, mamá → quiere).
3. Si hay un verbo de acción (comer, beber, ir, jugar…) y no hay verbo de estado, añade "quiero/quiere" si el sujeto lo requiere.
4. Conserva el sentido original sin añadir información que no esté implícita.
5. Responde ÚNICAMENTE con la frase. Sin comillas, sin punto final, sin explicaciones.

EJEMPLOS CORRECTOS:
"mama agua" → Mamá quiere agua
"yo comer" → Yo quiero comer
"nino dormir cama" → El niño quiere dormir en la cama
"papa trabajar" → Papá está trabajando
"yo dolor cabeza" → Yo tengo dolor de cabeza
"ir parque" → Yo quiero ir al parque
"Maria triste" → María está triste

EJEMPLOS INCORRECTOS (nunca hagas esto):
"mama agua" → Quiere agua  ← falta sujeto
"yo comer manzana" → Comer manzana  ← falta conjugar
"ir parque" → Ir al parque  ← falta sujeto y conjugación`
      },
      {
        role: 'user',
        content: `Palabras: ${rawText}\n\nFrase natural:`
      }
    ], 100);
    return result.replace(/^["\'\u2018\u2019]|["\'\u2018\u2019]$/g, '').replace(/\.$/, '');
  } catch(e) {
    console.error('getNaturalPhrase error:', e);
    return rawText;
  }
}

// ---- HABLAR ----
async function hablar() {
  const parts = [];
  const pictos = [];
  categories.map(c => c.key).forEach(s => {
    selected[s].forEach(p => {
      parts.push(p.word);
      pictos.push(p);
    });
  });
  if (!parts.length) return;
  const rawText = parts.join(' ');

  // Show overlay with spinner while waiting for AI
  const overlay = document.getElementById('speaking-overlay');
  const picsWrap = document.getElementById('speaking-pictos');
  const textEl = document.getElementById('speaking-text');
  const statusEl = document.getElementById('ai-status');

  picsWrap.innerHTML = pictos.map(p => `<img src="${p.url}" alt="${p.word}">`).join('');
  textEl.innerHTML = '<span class="spinner" style="display:inline-block;width:22px;height:22px;border:3px solid #EDE9FF;border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;"></span>';
  overlay.classList.add('visible');
  document.body.classList.add('no-scroll');
  statusEl.textContent = '✨ Mejorando frase…';

  // Wait for AI before speaking
  const naturalText = await getNaturalPhrase(rawText);
  lastNaturalText = naturalText;

  textEl.textContent = naturalText;
  statusEl.textContent = naturalText !== rawText ? `✨ "${naturalText}"` : '';

  // Save to favorites
  saveFrase(pictos, rawText, naturalText);

  // Speech synthesis AFTER we have the natural text
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(naturalText);
  utter.lang = 'es-ES';
  utter.rate = 0.82;
  utter.pitch = 1.05;
  utter.volume = 1;
  utter.onend = () => {
    overlay.classList.remove('visible');
    document.body.classList.remove('no-scroll');
  };
  window.speechSynthesis.speak(utter);
}

// ---- FRASES FAVORITAS ----
function getFrasesData() {
  try { return JSON.parse(localStorage.getItem('teayudo_frases') || '[]'); }
  catch(e) { return []; }
}

function saveFrase(pictos, rawText, naturalText) {
  const frases = getFrasesData();
  const key = rawText; // unique key by raw words
  const idx = frases.findIndex(f => f.key === key);
  if (idx > -1) {
    frases[idx].count = (frases[idx].count || 1) + 1;
    frases[idx].naturalText = naturalText;
  } else {
    frases.push({ key, text: rawText, naturalText, pictos: pictos.map(p => ({ url: p.url, word: p.word })), count: 1 });
  }
  // Sort by count desc
  frases.sort((a, b) => (b.count || 1) - (a.count || 1));
  localStorage.setItem('teayudo_frases', JSON.stringify(frases.slice(0, 50)));
}

async function transcribirFraseToDiv(input, resultDiv) {
  resultDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;font-weight:700;">🔍 Buscando pictogramas…</div>';

  try {
    // 1. Extraer palabras clave simples con Groq
    const rawWords = await groq([
      {
        role: 'system',
        content: 'Eres un experto en comunicación aumentativa (AAC) para personas con TEA. Extrae palabras clave de una frase para buscar en ARASAAC. Responde SOLO con las palabras separadas por comas, en forma base o infinitivo, en español. Máximo 6 palabras. Sin artículos ni preposiciones.'
      },
      {
        role: 'user',
        content: `Frase: "${input}"\n\nEjemplos:\n"Quiero comer una manzana" → querer, comer, manzana\n"Lava las manos con jabón" → lavar, manos, jabón\n"Mamá está en el baño" → mamá, estar, baño\n\nPalabras clave:`
      }
    ], 80);

    const words = rawWords.split(',').map(w => w.trim().toLowerCase()).filter(w => w.length > 0).slice(0, 6);
    if (!words.length) {
      resultDiv.innerHTML = '<div class="transcribe-error">No se pudieron extraer palabras clave.</div>';
      return;
    }

    // 2. Buscar todos los candidatos en ARASAAC en paralelo (guardar todos, no solo el primero)
    const allResults = await Promise.all(words.map(w => searchPictos(w)));

    // 3. Construir estructura con candidatos por palabra
    // found = array of { word, candidates: [{url, label}], selectedIdx }
    const found = [];
    words.forEach((word, i) => {
      const results = allResults[i] || [];
      if (!results.length) return;
      const candidates = results.slice(0, 8).map(r => ({
        url: pictoUrl(r._id),
        label: r.keywords && r.keywords[0] ? r.keywords[0].keyword : word
      }));
      found.push({ word, candidates, selectedIdx: 0 });
    });

    if (!found.length) {
      resultDiv.innerHTML = '<div class="transcribe-error">No se encontraron pictogramas para esta frase.</div>';
      return;
    }

    renderTranscribeResult(resultDiv, found, input);

  } catch(e) {
    console.error('transcribirFraseToDiv error:', e);
    resultDiv.innerHTML = '<div class="transcribe-error">❌ Error inesperado. Revisa la consola.</div>';
  }
}

function renderTranscribeResult(resultDiv, found, input) {
  resultDiv.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'transcribe-result-label';
  lbl.textContent = `✨ ${found.length} picto${found.length !== 1 ? 's' : ''} — arrastra para ordenar, ⇄ cambiar, ✕ eliminar`;
  resultDiv.appendChild(lbl);

  const rowDiv = document.createElement('div');
  rowDiv.className = 'transcribe-pictos-row draggable-row';

  // --- Drag state ---
  let dragIdx = null;
  let touchClone = null;
  let touchOffsetX = 0, touchOffsetY = 0;

  function buildItems() {
    rowDiv.innerHTML = '';
    found.forEach((item, i) => {
      if (i > 0) {
        const arrow = document.createElement('div');
        arrow.className = 'transcribe-picto-arrow';
        arrow.textContent = '›';
        arrow.dataset.arrow = true;
        rowDiv.appendChild(arrow);
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'transcribe-picto-item draggable-picto';
      wrapper.dataset.idx = i;

      const sel = item.candidates[item.selectedIdx];
      wrapper.innerHTML = `
        <div class="tp-img-wrap">
          <img src="${sel.url}" alt="${sel.label}" loading="lazy">
          <div class="tp-drag-handle" title="Arrastrar">⠿</div>
          <div class="tp-change-badge" title="Cambiar">⇄</div>
          <div class="tp-delete-badge" title="Eliminar">✕</div>
        </div>
        <span>${item.word}</span>
      `;

      // Change
      wrapper.querySelector('.tp-change-badge').onclick = (e) => {
        e.stopPropagation();
        openAltPicker(found, i, resultDiv, input);
      };
      // Delete
      wrapper.querySelector('.tp-delete-badge').onclick = (e) => {
        e.stopPropagation();
        found.splice(i, 1);
        renderTranscribeResult(resultDiv, found, input);
      };

      // --- MOUSE DRAG ---
      const handle = wrapper.querySelector('.tp-drag-handle');
      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        dragIdx = i;
        wrapper.classList.add('dragging');

        const onMove = (ev) => {
          const els = [...rowDiv.querySelectorAll('.draggable-picto')];
          els.forEach((el, j) => {
            const r = el.getBoundingClientRect();
            const midX = r.left + r.width / 2;
            if (ev.clientX < midX && j < dragIdx) {
              // swap left
              found.splice(j, 0, found.splice(dragIdx, 1)[0]);
              dragIdx = j;
              buildItems();
              rowDiv.querySelectorAll('.draggable-picto')[dragIdx].classList.add('dragging');
            } else if (ev.clientX > midX && j > dragIdx) {
              // swap right
              found.splice(j, 0, found.splice(dragIdx, 1)[0]);
              dragIdx = j;
              buildItems();
              rowDiv.querySelectorAll('.draggable-picto')[dragIdx].classList.add('dragging');
            }
          });
        };
        const onUp = () => {
          dragIdx = null;
          buildItems();
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // --- TOUCH DRAG ---
      handle.addEventListener('touchstart', (e) => {
        e.preventDefault();
        dragIdx = i;
        wrapper.classList.add('dragging');

        const touch = e.touches[0];
        const rect = wrapper.getBoundingClientRect();
        touchOffsetX = touch.clientX - rect.left;
        touchOffsetY = touch.clientY - rect.top;

        // Create floating clone
        touchClone = wrapper.cloneNode(true);
        touchClone.style.cssText = `
          position:fixed; z-index:9999; pointer-events:none; opacity:0.85;
          width:${rect.width}px; left:${rect.left}px; top:${rect.top}px;
          transition:none; box-shadow:0 8px 24px rgba(0,0,0,0.2);
          border-radius:12px;
        `;
        document.body.appendChild(touchClone);

        const onTouchMove = (ev) => {
          ev.preventDefault();
          const t = ev.touches[0];
          touchClone.style.left = (t.clientX - touchOffsetX) + 'px';
          touchClone.style.top  = (t.clientY - touchOffsetY) + 'px';

          const els = [...rowDiv.querySelectorAll('.draggable-picto')];
          els.forEach((el, j) => {
            if (j === dragIdx) return;
            const r = el.getBoundingClientRect();
            const midX = r.left + r.width / 2;
            if (j < dragIdx && t.clientX < midX) {
              found.splice(j, 0, found.splice(dragIdx, 1)[0]);
              dragIdx = j;
              buildItems();
              rowDiv.querySelectorAll('.draggable-picto')[dragIdx].classList.add('dragging');
            } else if (j > dragIdx && t.clientX > midX) {
              found.splice(j, 0, found.splice(dragIdx, 1)[0]);
              dragIdx = j;
              buildItems();
              rowDiv.querySelectorAll('.draggable-picto')[dragIdx].classList.add('dragging');
            }
          });
        };
        const onTouchEnd = () => {
          if (touchClone) { touchClone.remove(); touchClone = null; }
          dragIdx = null;
          buildItems();
          handle.removeEventListener('touchmove', onTouchMove);
          handle.removeEventListener('touchend', onTouchEnd);
        };
        handle.addEventListener('touchmove', onTouchMove, { passive: false });
        handle.addEventListener('touchend', onTouchEnd);
      }, { passive: false });

      rowDiv.appendChild(wrapper);
    });
  }

  buildItems();
  resultDiv.appendChild(rowDiv);

  // Alt picker container
  const altContainer = document.createElement('div');
  altContainer.id = 'alt-picker-container';
  resultDiv.appendChild(altContainer);

  const speakBtn = document.createElement('button');
  speakBtn.className = 'transcribe-speak-btn';
  speakBtn.innerHTML = '🔊 Leer frase original';
  speakBtn.onclick = () => {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(input);
    utter.lang = 'es-ES'; utter.rate = 0.82; utter.pitch = 1.05;
    window.speechSynthesis.speak(utter);
  };
  resultDiv.appendChild(speakBtn);

  const fullBtn = document.createElement('button');
  fullBtn.className = 'transcribe-fullscreen-btn';
  fullBtn.innerHTML = '⛶ Pantalla completa';
  fullBtn.onclick = () => openFullscreen(found.map(f => ({ url: f.candidates[f.selectedIdx].url, word: f.word })));
  resultDiv.appendChild(fullBtn);
}

function openAltPicker(found, idx, resultDiv, input) {
  // Remove existing picker if open for same idx
  const existing = document.getElementById('alt-picker-container');
  if (existing && existing.dataset.idx == idx) {
    existing.innerHTML = '';
    existing.dataset.idx = '';
    return;
  }

  const item = found[idx];
  const container = document.getElementById('alt-picker-container');
  container.dataset.idx = idx;

  container.innerHTML = `
    <div class="alt-picker-label">Elige el pictograma para "<strong>${item.word}</strong>":</div>
    <div class="alt-picker-grid" id="alt-picker-grid-${idx}"></div>
  `;

  const grid = container.querySelector(`#alt-picker-grid-${idx}`);
  item.candidates.forEach((c, j) => {
    const card = document.createElement('div');
    card.className = 'alt-picto-card' + (j === item.selectedIdx ? ' selected' : '');
    card.innerHTML = `<img src="${c.url}" alt="${c.label}"><span>${c.label}</span>`;
    card.onclick = () => {
      item.selectedIdx = j;
      // Re-render everything
      renderTranscribeResult(resultDiv, found, input);
      // Re-open picker for same word after re-render
      setTimeout(() => openAltPicker(found, idx, resultDiv, input), 10);
    };
    grid.appendChild(card);
  });
}

// Helper: llamada a Groq
async function groq(messages, max_tokens = 200) {
  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer __GROQ_API_KEY__`
    },
    body: JSON.stringify({ model: 'llama-3.1-8b-instant', max_tokens, messages })
  });
  if (!response.ok) {
    const err = await response.text();
    console.error('Groq error:', response.status, err);
    throw new Error('Groq API error: ' + response.status);
  }
  const data = await response.json();
  return data.choices[0].message.content.trim();
}

function addCategory() {
  const emoji = document.getElementById('new-cat-emoji').value.trim() || '📋';
  const name  = document.getElementById('new-cat-name').value.trim();
  if (!name) { alert('Escribe un nombre para la categoría'); return; }

  // Generate unique key from name
  const key = 'cat_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();

  const COLORS = [
    { color: '#4ABFD9', bg: '#EEF9FF', text: '#006A8A', border: '#A0DCEE' },
    { color: '#6BC47E', bg: '#EEFBF0', text: '#1A7C33', border: '#A3E8B0' },
    { color: '#B07FE8', bg: '#F3EEFF', text: '#6B35BF', border: '#C9AAEE' },
    { color: '#F4A340', bg: '#FFF8EE', text: '#9A5A00', border: '#F5CFA0' },
    { color: '#F97B6B', bg: '#FFF0EE', text: '#C0432E', border: '#FFC4BB' },
    { color: '#F5C842', bg: '#FFFBEB', text: '#8A6A00', border: '#F5D77A' },
  ];
  const col = COLORS[categories.length % COLORS.length];

  categories.push({ key, emoji, name, ...col });
  DB[key] = [];
  selected[key] = [];

  saveCategories();
  saveDB();
  renderManageCats();
  renderSectionsMain();
  renderModalTabs();
  currentTab = key;
  setModalTab(key);
}

function deleteCategory(key) {
  const cat = categories.find(c => c.key === key);
  const pictoCount = (DB[key] || []).length;
  const msg = pictoCount > 0
    ? `¿Eliminar "${cat.name}"? Borrará también sus ${pictoCount} pictogramas.`
    : `¿Eliminar la categoría "${cat.name}"?`;
  if (!confirm(msg)) return;

  // Remove from all state
  categories = categories.filter(c => c.key !== key);
  delete DB[key];
  delete selected[key];

  // If deleted tab was active, switch to first
  if (currentTab === key) {
    currentTab = categories.length ? categories[0].key : '';
  }

  saveCategories();
  saveDB();
  renderManageCats();
  renderSectionsMain();
  renderModalTabs();
  updateResultButton();
  if (currentTab) setModalTab(currentTab);
}

  currentApp = app;
  document.getElementById('view-teayudo').style.display = app === 'teayudo' ? '' : 'none';
  document.getElementById('view-traducTEA').style.display = app === 'traducTEA' ? '' : 'none';
  document.getElementById('ambito-bar').style.display = app === 'teayudo' ? '' : 'none';
  document.getElementById('tab-teayudo').classList.toggle('active', app === 'teayudo');
  document.getElementById('tab-traducTEA').classList.toggle('active', app === 'traducTEA');
  if (app === 'traducTEA') {
    document.getElementById('traducTEA-result').innerHTML = '';
    document.getElementById('traducTEA-input').value = '';
  }
}

// ---- ÁMBITO BAR ----
function renderAmbitoBar() {
  const scroll = document.getElementById('ambito-scroll');
  scroll.innerHTML = '';
  ambitos.forEach(amb => {
    const chip = document.createElement('button');
    chip.className = 'ambito-chip' + (amb.key === activeAmbito ? ' active' : '');
    chip.textContent = `${amb.emoji} ${amb.name}`;
    chip.onclick = () => selectAmbito(amb.key);
    scroll.appendChild(chip);
  });
}

function selectAmbito(key) {
  activeAmbito = key;
  // Reset selections
  categories.forEach(c => { selected[c.key] = []; });
  updateResultButton();
  renderAmbitoBar();
  renderSectionsMain();
}

// ---- ÁMBITOS MODAL ----
let editingAmbitoKey = null;

function openAmbitosModal() {
  document.getElementById('ambitos-overlay').classList.add('open');
  document.body.classList.add('no-scroll');
  renderAmbitosModal();
}

function closeAmbitosModal() {
  document.getElementById('ambitos-overlay').classList.remove('open');
  document.body.classList.remove('no-scroll');
  editingAmbitoKey = null;
}

function renderAmbitosModal() {
  const body = document.getElementById('ambitos-body');
  body.innerHTML = '';

  ambitos.forEach(amb => {
    const item = document.createElement('div');
    item.className = 'ambito-manage-item';
    const catNames = amb.isGlobal
      ? 'Todas las categorías'
      : (amb.cats || []).map(k => { const c = categories.find(x => x.key === k); return c ? c.emoji : ''; }).join(' ') || 'Sin categorías';
    item.innerHTML = `
      <div class="ambito-manage-icon">${amb.emoji}</div>
      <div class="ambito-manage-info">
        <div class="ambito-manage-name">${amb.name}${amb.isGlobal ? '<span class="global-badge">Global</span>' : ''}</div>
        <div class="ambito-manage-cats">${catNames}</div>
      </div>
      <div class="ambito-manage-actions">
        ${!amb.isGlobal ? `<button class="ambito-edit-btn" onclick="toggleEditAmbito('${amb.key}')">✏️</button>` : ''}
        ${!amb.isGlobal ? `<button class="ambito-del-btn" onclick="deleteAmbito('${amb.key}')">🗑️</button>` : ''}
      </div>
    `;
    body.appendChild(item);

    // Inline edit panel
    if (editingAmbitoKey === amb.key) {
      const panel = document.createElement('div');
      panel.className = 'ambito-edit-panel';
      panel.innerHTML = `
        <div class="ambito-edit-panel-title">Editar "${amb.name}"</div>
        <div class="ambito-name-row">
          <input class="ambito-name-emoji" id="edit-amb-emoji" type="text" value="${amb.emoji}" maxlength="2">
          <input class="ambito-name-input" id="edit-amb-name" type="text" value="${amb.name}" autocorrect="off">
        </div>
        <div class="ambito-edit-panel-title" style="margin-top:8px;">Categorías incluidas</div>
        ${categories.map(cat => {
          const on = (amb.cats || []).includes(cat.key);
          return `<div class="ambito-cat-toggle ${on ? 'on' : ''}" onclick="toggleAmbitocat('${amb.key}','${cat.key}')">
            <span class="ambito-cat-toggle-emoji">${cat.emoji}</span>
            <span class="ambito-cat-toggle-name">${cat.name}</span>
            <span class="ambito-cat-toggle-check">✓</span>
          </div>`;
        }).join('')}
        <button class="ambito-save-btn" onclick="saveAmbitoEdit('${amb.key}')">💾 Guardar</button>
      `;
      body.appendChild(panel);
    }
  });

  // Add new ámbito button
  const addBtn = document.createElement('button');
  addBtn.className = 'ambito-add-new-btn';
  addBtn.textContent = '➕ Nuevo ámbito';
  addBtn.onclick = () => createNewAmbito();
  body.appendChild(addBtn);
}

function toggleEditAmbito(key) {
  editingAmbitoKey = editingAmbitoKey === key ? null : key;
  renderAmbitosModal();
}

function toggleAmbitocat(ambitoKey, catKey) {
  const amb = ambitos.find(a => a.key === ambitoKey);
  if (!amb) return;
  if (!amb.cats) amb.cats = [];
  const idx = amb.cats.indexOf(catKey);
  if (idx > -1) amb.cats.splice(idx, 1);
  else amb.cats.push(catKey);
  renderAmbitosModal();
}

function saveAmbitoEdit(key) {
  const amb = ambitos.find(a => a.key === key);
  if (!amb) return;
  amb.emoji = document.getElementById('edit-amb-emoji').value.trim() || amb.emoji;
  amb.name  = document.getElementById('edit-amb-name').value.trim() || amb.name;
  editingAmbitoKey = null;
  saveAmbitos();
  renderAmbitosModal();
  renderAmbitoBar();
}

function deleteAmbito(key) {
  const amb = ambitos.find(a => a.key === key);
  if (!confirm(`¿Eliminar el ámbito "${amb.name}"?`)) return;
  ambitos = ambitos.filter(a => a.key !== key);
  if (activeAmbito === key) activeAmbito = 'global';
  saveAmbitos();
  renderAmbitosModal();
  renderAmbitoBar();
}

function createNewAmbito() {
  const key = 'amb_' + Date.now();
  ambitos.push({ key, emoji: '📋', name: 'Nuevo ámbito', cats: [], isGlobal: false });
  editingAmbitoKey = key;
  saveAmbitos();
  renderAmbitosModal();
}

// ---- TRADUCATEA ----
async function traducTEAConvertir() {
  const input = document.getElementById('traducTEA-input').value.trim();
  if (!input) return;
  const btn = document.getElementById('traducTEA-go-btn');
  const resultDiv = document.getElementById('traducTEA-result');
  btn.disabled = true;
  document.getElementById('traducTEA-btn-icon').className = 'spinner';
  // Reuse the same logic as transcribirFrase but targeting TraducTEA divs
  await transcribirFraseToDiv(input, resultDiv);
  btn.disabled = false;
  document.getElementById('traducTEA-btn-icon').className = '';
  document.getElementById('traducTEA-btn-icon').textContent = '✨';
}

// ---- KEYBOARD ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('picker-screen').classList.contains('open')) closePicker();
    else if (document.getElementById('fav-overlay').classList.contains('open')) closeFavModal();
    else closeSettings();
  }
});

// ---- BOOT ----
loadDB();
loadAmbitos();
renderAmbitoBar();
renderSectionsMain();
updateResultButton();
</script>

</body>
</html>
