name: Deploy TEAyudo

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inyectar API key
        run: |
          python3 -c "
          content = open('TEAyudo.html').read()
          content = content.replace('__GROQ_API_KEY__', '${{ secrets.GROQ_API_KEY }}')
          open('TEAyudo.html', 'w').write(content)
          print('Key inyectada OK')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
